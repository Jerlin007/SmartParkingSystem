<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Register — Smart Parking</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body class="auth-body">
  <div class="auth-card">
    <h2>Create Account</h2>
    <p class="subtitle">Register to get started</p>
    <div id="msg" class="msg"></div>
    <form id="form">
      <div class="form-group">
        <label>Username</label>
        <input type="text" id="username" required>
      </div>
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="email" required>
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="password" required>
      </div>
      <div class="form-group">
        <label>Role</label>
        <select id="role">
          <option value="USER">USER</option>
          <option value="ADMIN">ADMIN</option>
        </select>
      </div>
      <button type="submit" class="btn btn-primary btn-full">Register</button>
    </form>
    <p class="footer-link">Already registered? <a href="/pages/login.html">Sign in</a></p>
  </div>

  <script src="/js/api.js"></script>
  <script>
    redirectIfLoggedIn();

    document.getElementById("form").addEventListener("submit", async (e) => {
      e.preventDefault();
      const role = document.getElementById("role").value;
      const body = {
        username: document.getElementById("username").value.trim(),
        email:    document.getElementById("email").value.trim(),
        password: document.getElementById("password").value,
        role:     role
      };
      const res = await apiFetch("/auth/register", "POST", body);
      if (res && res.ok) {
        showMsg("msg", "Account created. Redirecting to login...", "success");
        setTimeout(() => window.location.href = "/pages/login.html", 1500);
      } else {
        showMsg("msg", "Registration failed. Check your inputs.", "error");
      }
    });
  </script>
</body>
</html>
